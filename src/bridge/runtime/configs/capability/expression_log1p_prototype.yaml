  skip_table_csv: artifacts/stage1_full/scores/full_model_variant_skips.csv
  evaluation_modes:
  - raw_label_transfer_no_training
  max_eval_cells: 20000
  source_dataset_score_formula: composite_score = 0.45*baseline_macro_f1_mean + 0.40*variant_macro_f1_mean + 0.15*robustness_ratio_mean; weights are renormalized if a component is missing.
