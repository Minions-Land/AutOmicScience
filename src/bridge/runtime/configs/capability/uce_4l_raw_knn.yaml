display_name: UCE 4-layer raw backbone kNN label transfer
provider: foundation-model
family: uce
evaluator: raw_label_transfer
dependencies:
- pytorch
- pandas
artifacts:
  checkpoint:
    path: ${AOS_MAS_UCE_4L_DIR}/4layer_model.torch
    required: true
  tokens:
    path: ${AOS_MAS_UCE_4L_DIR}/all_tokens.torch
    required: true
  species_table:
    path: ${AOS_MAS_UCE_4L_DIR}/species_chrom.csv
    required: true
executor_defaults:
  embedding_method: uce_4l_raw
  transfer_method: knn
  evaluation_mode: raw_label_transfer_no_training
  min_shared_genes: 30
  max_reference_cells: 1000
  k: 15
data_constraints:
  compatible_contract: source_gene_panel_label_transfer
  supports_sparse_matrix: true
  requires_reference: true
  supports_spatial: true
