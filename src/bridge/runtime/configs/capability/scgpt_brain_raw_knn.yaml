model_id: scgpt_brain_raw_knn
version: 0.1.0
supported_tasks:
- annotation
stage1_status: not_included_in_clean_repo
modalities:
- single-cell transcriptomics
- spatial transcriptomics
species_scope:
- human
- mouse
tissue_scope:
- brain
- broad
input_requirements:
  required_formats:
  - standard_bundle
  - h5ad
  - npz
  required_fields:
  - X
  - gene symbols
  - native_label
  gene_contract: source-specific gene panel; execution aligns shared genes only
  label_contract:
  - fine/native label
  - coarse label when available
output_contract:
  primary_outputs:
  - predictions.csv
  - metrics.csv
  score_fields:
  - macro_f1
  - accuracy
  - weighted_f1
compute_requirements:
  preferred_device: gpu
  minimum_memory: 16GB
