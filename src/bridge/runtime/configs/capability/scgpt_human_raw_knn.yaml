display_name: scGPT human checkpoint kNN label transfer
provider: foundation-model
family: scgpt
evaluator: raw_label_transfer
dependencies:
- pytorch
- scgpt
artifacts:
  checkpoint:
    path: ${AOS_MAS_SCGPT_DIR}/human/best_model.pt
    required: true
  vocab:
    path: ${AOS_MAS_SCGPT_DIR}/human/vocab.json
    required: true
  args:
    path: ${AOS_MAS_SCGPT_DIR}/human/args.json
    required: true
executor_defaults:
  embedding_method: scgpt_human_raw
  transfer_method: knn
  evaluation_mode: raw_label_transfer_no_training
  min_shared_genes: 30
  max_reference_cells: 1000
  k: 15
data_constraints:
  compatible_contract: source_gene_panel_label_transfer
  supports_sparse_matrix: true
  requires_reference: true
  supports_spatial: true
