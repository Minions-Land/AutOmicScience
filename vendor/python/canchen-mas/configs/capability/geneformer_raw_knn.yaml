display_name: Geneformer raw backbone kNN label transfer
provider: foundation-model
family: geneformer
evaluator: raw_label_transfer
dependencies:
- pytorch
- transformers
- safetensors
artifacts:
  checkpoint:
    path: ${CANCHEN_MAS_GENEFORMER_DIR}/model.safetensors
    required: true
  code_and_vocab:
    path: ${CANCHEN_MAS_GENEFORMER_DIR}/Geneformer_code_only
    required: true
executor_defaults:
  embedding_method: geneformer_raw
  transfer_method: knn
  evaluation_mode: raw_label_transfer_no_training
  min_shared_genes: 30
  max_reference_cells: 1000
  k: 15
data_constraints:
  compatible_contract: source_gene_panel_label_transfer
  supports_sparse_matrix: true
  requires_reference: true
  supports_spatial: true
