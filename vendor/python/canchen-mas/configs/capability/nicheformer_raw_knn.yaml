display_name: Nicheformer raw backbone kNN label transfer
provider: foundation-model
family: nicheformer
evaluator: raw_label_transfer
dependencies:
- pytorch
- anndata
- numpy
artifacts:
  checkpoint:
    path: ${CANCHEN_MAS_NICHEFORMER_DIR}/nicheformer.ckpt
    required: true
  vocab_h5ad:
    path: ${CANCHEN_MAS_NICHEFORMER_DIR}/model.h5ad
    required: true
  gene_map:
    path: ${CANCHEN_MAS_NICHEFORMER_DIR}/gene_name_id_dict_gc104M.pkl
    required: true
executor_defaults:
  embedding_method: nicheformer_raw
  transfer_method: knn
  evaluation_mode: raw_label_transfer_no_training
  min_shared_genes: 30
  max_reference_cells: 1000
  k: 15
data_constraints:
  compatible_contract: source_gene_panel_label_transfer
  supports_sparse_matrix: true
  requires_reference: true
  supports_spatial: true
